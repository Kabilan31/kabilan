s<!DOCTYPE html> 
<html> 
<head> 
    <title>Attendance System</title> 
    <style> 
        body { 
            font-family: Arial; 
            margin: 0; 
            background: linear-gradient(to right, #4facfe, #00f2fe); 
        } 
 
        h2 { 
            text-align: center; 
            color: white; 
            padding: 15px; 
        } 
 
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        } 
 
        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer; 
        } 
 
        .content { 
            display: none; 
            background: white; 
            margin: 20px; 
            padding: 20px; 
            border-radius: 10px; 
        } 
 
        table { 
            width: 100%; 
            border-collapse: collapse; 
        } 
 
        th, td { 
            padding: 10px; 
            border: 1px solid #ddd; 
            text-align: center; 
        } 
 
        button { 
            padding: 6px 12px; 
            margin: 2px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        } 
 
        .present { background: green; color: white; } 
        .absent { background: red; color: white; } 
        .lock { background: gray; color: white; } 
 
        .login, .addStudent { 
            text-align: center; 
            margin: 10px; 
        } 
 
        input { 
            padding: 5px; 
        } 
    </style> 
</head> 
<body> 
 
<h2>
📊
 Smart Attendance System</h2> 
 
<div class="login"> 
    <input type="password" id="adminPass" placeholder="Admin Password"> 
    <button onclick="login()">Login</button> 
    <p id="loginStatus"></p> 
</div> 
 
<div class="container"> 
    <div class="card" onclick="show('attendance')">
📅
<br>Attendance</div> 
    <div class="card" onclick="show('reports')">
📊
<br>Reports</div> 
    <div class="card" onclick="show('students')">
👤
<br>Students</div> 
</div> 
 
<!-- Attendance --> 
<div id="attendance" class="content"> 
    <h3>Attendance (Today)</h3> 
    <p id="todayDate"></p> 
    <button onclick="submitDay()">Submit & Lock</button> 
    <table id="attendanceTable"></table> 
</div> 
 
<!-- Reports --> 
<div id="reports" class="content"> 
    <h3>Reports</h3> 
    <table id="reportTable"></table> 
</div> 
 
<!-- Students --> 
<div id="students" class="content"> 
    <h3>Manage Students</h3> 
 
    <div class="addStudent"> 
        <input type="text" id="newStudent" placeholder="Student Name"> 
        <button onclick="addStudent()">Add</button> 
    </div> 
 
    <ul id="studentList"></ul> 
</div> 
 
<script> 
let ADMIN_PASSWORD = "1234"; 
let isAdmin = false; 
 
// Load from storage 
let students = JSON.parse(localStorage.getItem("students")) || ["Kabilan","Dhanush Kumar","Nithish","Praveen"]; 
let attendanceData = JSON.parse(localStorage.getItem("attendance")) || {}; 
 
let today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD 
 
function save() { 
    localStorage.setItem("students", JSON.stringify(students)); 
    localStorage.setItem("attendance", JSON.stringify(attendanceData)); 
} 
 
function login() { 
    let pass = document.getElementById("adminPass").value; 
    if (pass === ADMIN_PASSWORD) { 
        isAdmin = true; 
        document.getElementById("loginStatus").innerText = "Admin Logged In"; 
    } else { 
        document.getElementById("loginStatus").innerText = "Wrong Password"; 
    } 
} 
 
function show(id) { 
    document.querySelectorAll('.content').forEach(d => d.style.display = "none"); 
    document.getElementById(id).style.display = "block"; 
 
    if (id === "attendance") renderAttendance(); 
    if (id === "reports") renderReports(); 
    if (id === "students") renderStudents(); 
} 
 
// Attendance 
function renderAttendance() { 
    document.getElementById("todayDate").innerText = "Date: " + today; 
 
    if (!attendanceData[today]) { 
        attendanceData[today] = {}; 
        students.forEach(s => attendanceData[today][s] = "Not Marked"); 
    } 
 
    let table = "<tr><th>Name</th><th>Status</th><th>Action</th></tr>"; 
 
    students.forEach(name => { 
        table += ` 
        <tr> 
            <td>${name}</td> 
            <td>${attendanceData[today][name]}</td> 
            <td> 
                ${isAdmin ? ` 
                <button class="present" onclick="mark('${name}','Present')">Present</button> 
                <button class="absent" onclick="mark('${name}','Absent')">Absent</button> 
                ` : `<button class="lock">Locked</button>`} 
            </td> 
        </tr>`; 
    }); 
 
    document.getElementById("attendanceTable").innerHTML = table; 
} 
 
function mark(name, status) { 
    if (!isAdmin) return; 
    attendanceData[today][name] = status; 
    save(); 
    renderAttendance(); 
} 
 
function submitDay() { 
    if (!isAdmin) return; 
    alert("Attendance Locked for " + today); 
} 
 
// Reports 
function renderReports() { 
    let table = "<tr><th>Name</th><th>Present</th><th>Total</th><th>%</th></tr>"; 
 
    students.forEach(name => { 
        let present = 0; 
        let total = 0; 
 
        for (let date in attendanceData) { 
            if (attendanceData[date][name]) { 
                total++; 
                if (attendanceData[date][name] === "Present") present++; 
            } 
        } 
 
        let percent = total === 0 ? 0 : ((present/total)*100).toFixed(1); 
 
        table += ` 
        <tr> 
            <td>${name}</td> 
            <td>${present}</td> 
            <td>${total}</td> 
            <td>${percent}%</td> 
        </tr>`; 
    }); 
 
    document.getElementById("reportTable").innerHTML = table; 
} 
 
// Students 
function renderStudents() { 
    let list = ""; 
    students.forEach((name, index) => { 
        list += `<li>${name}  
        <button onclick="removeStudent(${index})">
❌
</button></li>`; 
    }); 
    document.getElementById("studentList").innerHTML = list; 
} 
 
function addStudent() { 
    let name = document.getElementById("newStudent").value; 
    if (!name) return; 
    students.push(name); 
    save(); 
    renderStudents(); 
} 
 
function removeStudent(index) { 
    students.splice(index, 1); 
    save(); 
    renderStudents(); 
} 
</script> 
 
</body> 
</html>
